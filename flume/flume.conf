# ─────────────────────────────────────────────────────────────
#  Apache Flume — Agent : spool → HDFS
# ─────────────────────────────────────────────────────────────
agent.sources  = spoolSource
agent.sinks    = hdfsSink
agent.channels = memChannel

# ── Source : SpoolDir ─────────────────────────────────────────
agent.sources.spoolSource.type           = spooldir
agent.sources.spoolSource.spoolDir       = /var/log/flume/spool
agent.sources.spoolSource.channels       = memChannel
agent.sources.spoolSource.fileSuffix     = .COMPLETED
agent.sources.spoolSource.deletePolicy   = immediate
agent.sources.spoolSource.includePattern = ^.*\\.log$
agent.sources.spoolSource.interceptors   = tsInterceptor
agent.sources.spoolSource.interceptors.tsInterceptor.type            = timestamp
agent.sources.spoolSource.interceptors.tsInterceptor.preserveExisting = false

# ── Channel : Mémoire ─────────────────────────────────────────
agent.channels.memChannel.type                = memory
agent.channels.memChannel.capacity            = 20000
agent.channels.memChannel.transactionCapacity = 500

# ── Sink : HDFS ───────────────────────────────────────────────
agent.sinks.hdfsSink.type                    = hdfs
agent.sinks.hdfsSink.channel                 = memChannel
agent.sinks.hdfsSink.hdfs.path               = hdfs://namenode:9000/flume/logs/%Y%m%d
agent.sinks.hdfsSink.hdfs.fileNamePrefix     = events-
agent.sinks.hdfsSink.hdfs.fileSuffix         = .log
agent.sinks.hdfsSink.hdfs.fileType           = DataStream
agent.sinks.hdfsSink.hdfs.writeFormat        = Text
agent.sinks.hdfsSink.hdfs.rollInterval       = 60
agent.sinks.hdfsSink.hdfs.rollSize           = 134217728
agent.sinks.hdfsSink.hdfs.rollCount          = 0
agent.sinks.hdfsSink.hdfs.batchSize          = 200
agent.sinks.hdfsSink.hdfs.useLocalTimeStamp  = true
agent.sinks.hdfsSink.hdfs.callTimeout        = 30000
agent.sinks.hdfsSink.hdfs.idleTimeout        = 0
